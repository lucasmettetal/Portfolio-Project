version: '3.8'

services:

  postgres:
    image: postgres:17-alpine
    container_name: rue25_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rue25
      POSTGRES_PASSWORD: rue25password
      POSTGRES_DB: rue25
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rue25"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: rue25_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rue25:rue25password@postgres:5432/rue25
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    container_name: rue25_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
